<script type="module">
	import { fetchStreamStatus, getDate, getOfflineTime, getBirthdayCountdown, getNextStreamTime, getActualTimeDifference } from './src/index.js';
	let status, offlineDate, streamDate;
	async function start() {
		try {
			status = await fetchStreamStatus();
			console.log(status);
			offlineDate = await getDate(status.offlineTimestamp);
			streamDate = await getDate(status.nextStream);
			console.log(offlineDate);
			console.log(streamDate);
			render();
		} catch (err) {
			console.error("oops!");
		}
	}

	let counterIndex = 0;
	let counterArray = ["", "", "",""];
	let counterString = ["<h1>time since last seen:</h1>","<h1>time until next stream:</h1>", "<h1>time until birthday:</h1>", "<h1>times apologized:</h1>"];

	function changeCounterType(direction = "right") {
    if (direction == "right") {
        if (counterIndex < 3) {
            counterIndex += 1;
        } else {
            counterIndex = 0;
        }
    } else {
        if (counterIndex > 0) {
            counterIndex -= 1;
        } else {
            counterIndex = 3;
        }
    }
    render();
	}

	function render() {
		let timerLabel = document.getElementById("timer-label");
		let actualTimer = document.getElementById("timer-actual-time");

		counterArray[0] = status.isLive ? "🐁" : getOfflineTime(offlineDate);
		counterArray[1] = status.isLive ? "🐁"
			: ((status.nextStream && getActualTimeDifference(streamDate) > 0) ? getNextStreamTime(streamDate) : "where mimi???????????");
		counterArray[2] = getBirthdayCountdown();
		counterArray[3] = status.sorryCount;

		timerLabel.innerHTML = counterString[counterIndex];
		actualTimer.innerHTML = counterArray[counterIndex];
	}

	setInterval(render, 1000);

	setInterval(async function() {
		status = await fetchStreamStatus();
		offlineDate = await getDate(status.offlineTimestamp);
		streamDate = await getDate(status.nextStream);
	}, 30000);

	document.addEventListener("DOMContentLoaded", function() {
		start();

		document.getElementById("timer-button-left").addEventListener("click", () => changeCounterType("left"));
		document.getElementById("timer-button-right").addEventListener("click", () => changeCounterType("right"));
	});


</script>

<!DOCTYPE html>
<html>
<body>

<h1>oh god it hurts so bad</h1>
<h6>test</h6>
<p id="timestampThing"></p>
<p id="birthdayTimestampThing"></p>

<script type="module">
import { fetchStreamStatus, getOfflineDate, getOfflineTime, getBirthdayCountdown } from './src/index.js';
var status = await fetchStreamStatus();
var offlineDate = await getOfflineDate();
function render() {
	var timer = document.getElementById("timestampThing");
	var birthdayTimer = document.getElementById("birthdayTimestampThing");
	if (status.isLive) {
		timer.innerHTML = "wow im living it(??)";
	} else {
		timer.innerHTML = offlineDate ? getOfflineTime(offlineDate) : "";
	}
	birthdayTimer.innerHTML = getBirthdayCountdown();
}
render();
setInterval(render, 1000);
setInterval(async function() {
	status = await fetchStreamStatus();
	offlineDate = await getOfflineDate();
}, 30000);
</script>

</body>
</html>

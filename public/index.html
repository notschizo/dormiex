<!DOCTYPE html>
<html>
<body>

<h1>oh god it hurts so bad</h1>
<h6>test</h6>
<p id="timestampThing"></p>

<script type="module">
import { fetchStreamStatus, getOfflineDate, formatMilliseconds } from './src/index.js';
var status = await fetchStreamStatus();
var offlineDate = await getOfflineDate();
function render() {
	var el = document.getElementById("timestampThing");
	if (status.isLive) {
		el.innerHTML = "wow im living it(??)";
	} else {
		el.innerHTML = offlineDate ? formatMilliseconds(offlineDate) : "";
	}
}
render();
setInterval(render, 1000);
setInterval(async function() {
	status = await fetchStreamStatus();
	offlineDate = await getOfflineDate();
}, 30000);
</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css" type="text/css">
<script src="https://unpkg.com/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>

<script>
	let toggle = true;
	let counterIndex = 0;
	let counterArray = [];
	let counterString = ["<h1>Time since last seen:</h1>", "<h1>Time until birthday:</h1>", "<h1>Times apologized:</h1>"];

	function changeCounterType(direction = "right") {
    if (direction == "right") {
        if (counterIndex < 2) {
            counterIndex += 1;
        } else {
            counterIndex = 0;
        }
    } else {
        if (counterIndex > 0) {
            counterIndex -= 1;
        } else {
            counterIndex = 2;
        }
    }
    render();
}

	function toggleOnlineStatus() {
		let inner;
		let border;
		let icon;
		if (toggle == true) {
			inner = "rgba(76, 245, 39, 0.5)";
			border = "green";
			icon = "mimi-icon"
			toggle = false;
		} else {
			inner = "rgba(255, 54, 54, 0.5)";
			border = "red";
			icon = "mimi-icon-offline"
			toggle = true;
		}
		render(inner, border, icon);
	}

	function render(inner = "rgba(255, 54, 54, 0.5)", border = "red", icon = "mimi-icon-offline") {
		let obituaryText = document.getElementById("obituary-text");
		let timerLabel = document.getElementById("timer-label");

		timerLabel.innerHTML = counterString[counterIndex];

		if (border == "red") {
			obituaryText.innerHTML = "i miss mimi so bad";
		} else {
			obituaryText.innerHTML = "mimi live!! mimi time!!";
		}
		document.documentElement.style.setProperty("--online-color", inner);
		document.documentElement.style.setProperty("--online-border", border);

		let frontImage = document.getElementById("mimi-icon-front");
		let backImage = document.getElementById("mimi-icon-back");
		let newIcon = "./img/" + icon + ".png";
		backImage.setAttribute("src", newIcon);
		frontImage.classList.add("fade-out");

		setTimeout(() => {
			frontImage.setAttribute("src", newIcon);
			frontImage.classList.remove("fade-out");
		}, 300);
	}

	document.addEventListener("DOMContentLoaded", function() {
	twemoji.parse(document.body);
	render();
	});

</script>

<body>

<div class="bg-image"></div>
<div class="the-main-thing-box-thing">

	<div class="icon" style="position: relative; width: 150px; height: 150px;">
		<img id="mimi-icon-back" src="./img/mimi-icon-offline.png" height="150" width="150" style="position: absolute;">

		<img id="mimi-icon-front" src="./img/mimi-icon-offline.png" height="150" width="150" style="position: absolute; z-index: 2;">
	</div>
	<h1 class="title-card">Nemimi Yane</h1>
	<h1 class="oshi-mark">🐁🪤</h1>
	<button id="obituary-text" class="obituary-text" onclick="toggleOnlineStatus()"></button>

	<a href="https://twitch.tv/NemimiYane" target="_blank">
		<div class="socials twitch"><h1>twitch</h1></div>
	</a>
	<a href="https://youtube.com/NemimiYane" target="_blank">
		<div class="socials yt"><h1>youtube</h1></div>
	</a>
	<a href="https://x.com/NemimiYane" target="_blank">
		<div class="socials twitter"><h1>twitter</h1></div>
	</a>
	<a href="https://marshmallow-qa.com/nemimi" target="_blank">
		<div class="socials maro"><h1>maro</h1></div>
	</a>


	<div class="divider"></div>
	<div id="timer-label" class="timer-label"><h1>Time since last seen:</h1></div>
	<div class="evil-ass-yearn-timer"><div class="timer-actual-time">timer</div></div>
	<button class="button timer-button-left" onclick="changeCounterType('left')">&lt;</button>
	<button class="button timer-button-right" onclick="changeCounterType('right')">&gt;</button>

</div>
</div>

</body>
</html>
